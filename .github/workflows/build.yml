name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download Beef
        shell: powershell
        run: Start-BitsTransfer -Source "https://nightly.beeflang.org/BeefSetup.exe" -Destination "BeefBuild.exe"
      
      - name: Extract Beef
        shell: powershell
        run: 7z x BeefBuild.exe -oBeef
      
      - name: Copy __user folder
        shell: powershell
        run: Copy-Item -Path Beef/__user/* -Destination . -Recurse
      
      - name: Build
        shell: powershell
        run: Beef/bin/BeefBuild.exe -config=Release
      
      - name: List files
        shell: powershell
        run: ls build/Release_Win64
